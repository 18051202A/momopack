<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — MomoPack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase.js"></script>
  <script>
    /* ── Admin route guard ── */
    (async () => {
      window._sb = supabaseClient;
      const { data: { session } } = await window._sb.auth.getSession();
      if (!session) { window.location.href = '../account.html'; return; }
      const { data: profile } = await window._sb.from('users').select('full_name, role, email').eq('id', session.user.id).single();
      if (!profile || profile.role !== 'admin') { window.location.href = '../dashboard.html'; return; }
      window._adminName  = profile.full_name || session.user.email;
      window._adminEmail = session.user.email;
    })();
  </script>
</head>
<body>

<div id="loader"><div class="loader-logo"><img src="../logo/vendle logo 2.png" alt="MomoPack"></div></div>

<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-logo">
      <a href="../index.html"><img src="../logo/vendle logo 2.png" alt="MomoPack"></a>
      <div class="sidebar-admin-badge">&#9632; Admin Portal</div>
    </div>
    <nav class="sidebar-nav">
      <span class="sidebar-nav-label">Menu</span>
      <a href="dashboard.html" class="sidebar-link active">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="orders.html" class="sidebar-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Orders
      </a>
      <a href="clients.html" class="sidebar-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Clients
      </a>
      <a href="products.html" class="sidebar-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
        Products
      </a>
    </nav>
    <div class="sidebar-bottom">
      <a href="../dashboard.html" class="sidebar-bottom-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Client Portal
      </a>
      <button class="sidebar-bottom-link sidebar-signout" id="signOutBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="admin-main">
    <header class="admin-topbar">
      <button class="topbar-menu-btn" id="sidebarToggle"><span></span><span></span><span></span></button>
      <span class="topbar-title">Admin Dashboard</span>
      <div class="topbar-right">
        <div class="topbar-user">
          <div class="topbar-avatar" id="topbarAvatar">A</div>
          <span class="topbar-email" id="topbarEmail"></span>
          <span class="admin-badge">Admin</span>
        </div>
      </div>
    </header>

    <div class="admin-page">
      <div class="page-head">
        <div class="page-head-left">
          <h1 class="page-title">Overview</h1>
          <p class="page-sub">Summary of all orders and clients.</p>
        </div>
      </div>

      <!-- Stat cards -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="stat-icon stat-icon--blue"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div><div><div class="stat-value" id="statTotal">—</div><div class="stat-label">Total Orders</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon--orange"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><div class="stat-value" id="statPending">—</div><div class="stat-label">Pending Orders</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon--green"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div><div><div class="stat-value" id="statShipped">—</div><div class="stat-label">Orders Shipped</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon--purple"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div><div class="stat-value" id="statClients">—</div><div class="stat-label">Total Clients</div></div></div>
      </div>

      <!-- Recent orders -->
      <div class="admin-card">
        <div class="card-head">
          <h2 class="card-title">Recent Orders</h2>
          <a href="orders.html" class="btn btn-outline btn-sm">View All</a>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Client</th>
                <th>Order ID</th>
                <th>Status</th>
                <th>Total</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="recentOrdersBody">
              <tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--gray-500);">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('loader').classList.add('hidden'), 500);
});

document.getElementById('sidebarToggle').addEventListener('click', () => {
  document.getElementById('adminSidebar').classList.toggle('open');
});

document.getElementById('signOutBtn').addEventListener('click', async () => {
  await window._sb.auth.signOut();
  window.location.href = '../account.html';
});

function statusBadge(s) {
  return `<span class="status-badge status--${s || 'pending'}">${s || 'pending'}</span>`;
}

function fmt(amount, currency) {
  if (amount == null) return '—';
  return new Intl.NumberFormat('en-US', { style: 'currency', currency: currency || 'USD' }).format(amount);
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

/* ── Set topbar info ── */
let _attempts = 0;
(function waitForAdmin() {
  if (window._adminEmail !== undefined || _attempts++ > 20) {
    const email = window._adminEmail || '';
    const name  = window._adminName  || email;
    document.getElementById('topbarEmail').textContent  = email;
    document.getElementById('topbarAvatar').textContent = (name.charAt(0) || 'A').toUpperCase();
  } else {
    setTimeout(waitForAdmin, 100);
  }
})();

/* ── Load stats & recent orders ── */
async function loadDashboard() {
  let sb;
  let tries = 0;
  while (!window._sb && tries++ < 20) await new Promise(r => setTimeout(r, 150));
  sb = window._sb;
  if (!sb) return;

  const [
    { count: totalOrders },
    { count: pendingOrders },
    { count: shippedOrders },
    { count: totalClients },
    { data: recentOrders }
  ] = await Promise.all([
    sb.from('orders').select('*', { count: 'exact', head: true }),
    sb.from('orders').select('*', { count: 'exact', head: true }).eq('status', 'pending'),
    sb.from('orders').select('*', { count: 'exact', head: true }).eq('status', 'shipped'),
    sb.from('users').select('*', { count: 'exact', head: true }).eq('role', 'client'),
    sb.from('orders').select('id, status, total_amount, currency, created_at, client_id').order('created_at', { ascending: false }).limit(10)
  ]);

  document.getElementById('statTotal').textContent   = totalOrders   ?? '—';
  document.getElementById('statPending').textContent = pendingOrders ?? '—';
  document.getElementById('statShipped').textContent = shippedOrders ?? '—';
  document.getElementById('statClients').textContent = totalClients  ?? '—';

  /* Fetch client names for recent orders */
  const clientIds = [...new Set((recentOrders || []).map(o => o.client_id).filter(Boolean))];
  let clientMap = {};
  if (clientIds.length) {
    const { data: clients } = await sb.from('users').select('id, full_name, email').in('id', clientIds);
    (clients || []).forEach(c => { clientMap[c.id] = c.full_name || c.email || c.id; });
  }

  const tbody = document.getElementById('recentOrdersBody');
  if (!recentOrders || recentOrders.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">📋</div><p>No orders yet.</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = recentOrders.map(o => `
    <tr class="clickable" onclick="window.location='order-detail.html?id=${o.id}'">
      <td>${clientMap[o.client_id] || '—'}</td>
      <td style="font-family:monospace;font-size:.8rem;">${o.id.slice(0,8)}…</td>
      <td>${statusBadge(o.status)}</td>
      <td>${fmt(o.total_amount, o.currency)}</td>
      <td>${fmtDate(o.created_at)}</td>
    </tr>
  `).join('');
}

loadDashboard();
</script>
</body>
</html>
